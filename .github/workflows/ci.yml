name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint: JS syntax + JSON validation ──
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint JS + JSON
        run: node scripts/lint.js

  # ── Unit Tests ──
  test-unit:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run unit tests
        run: node --test --test-force-exit test/unit/*.test.js

  # ── API Smoke Tests (requires running server) ──
  test-smoke:
    name: 💨 Smoke Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create minimal workspace
        run: |
          mkdir -p ~/.openclaw/workspace/fleet/agents
          mkdir -p ~/.openclaw/workspace/memory
          echo '{}' > ~/.openclaw/openclaw.json
          echo '# TODO' > ~/.openclaw/workspace/TODO.md
          echo '# MEMORY' > ~/.openclaw/workspace/MEMORY.md

      - name: Start server
        run: |
          node server/server.js &
          echo $! > /tmp/server.pid
          sleep 3
        env:
          PORT: 8765
          OC_GATEWAY_URL: http://localhost:18789
          OC_GATEWAY_TOKEN: test-token-ci

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          API_URL: http://127.0.0.1:8765

      - name: Stop server
        if: always()
        run: kill $(cat /tmp/server.pid) 2>/dev/null || true
