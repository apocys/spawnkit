<!DOCTYPE html>
<html><head><title>Script Load Test</title></head>
<body>
<div id="log" style="font-family:monospace;white-space:pre;font-size:12px;padding:20px"></div>
<script>
var log = document.getElementById('log');
var scripts = [
  'deploy-wizard.js', 'onboarding.js', 'auth.js', 'oc-data-store.js',
  'app.js', 'src/data-bridge.js', 'main.js', 'overlay-manager.js',
  'modules/overlays.js', 'modules/chat.js', 'modules/brainstorm.js',
  'modules/missions.js', 'modules/settings.js', 'modules/marketplace.js',
  'modules/skills-catalog.js', 'modules/creator-profile.js',
  'mission-desk.js', 'swarm-ui.js', 'agents.js', 'orchestration.js',
  'mc-sidebar-left.js', 'mc-center.js', 'mc-sidebar-right.js', 'mc-core.js',
  'skill-forge.js', 'use-case-explorer.js',
  'feature-toolbar.js', 'panel-fixes.js', 'channel-onboarding.js',
  'exec-agent-pulse.js', 'mission-control.js'
];
var i = 0;
function loadNext() {
  if (i >= scripts.length) { log.textContent += '\n✅ ALL SCRIPTS LOADED OK'; return; }
  var name = scripts[i];
  var start = performance.now();
  log.textContent += 'Loading ' + name + '... ';
  var s = document.createElement('script');
  s.src = name;
  s.onload = function() {
    log.textContent += 'OK (' + Math.round(performance.now()-start) + 'ms)\n';
    i++; loadNext();
  };
  s.onerror = function() {
    log.textContent += 'FAILED\n';
    i++; loadNext();
  };
  // Timeout detection
  var timer = setTimeout(function() {
    log.textContent += 'HUNG (>5s)!\n';
  }, 5000);
  var origOnload = s.onload;
  s.onload = function() { clearTimeout(timer); origOnload(); };
  document.body.appendChild(s);
}
loadNext();
</script>
</body></html>
