<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpawnKit — Medieval Castle</title>
    <script>
        if (window.location.hostname.includes('spawnkit.ai')) {
            window.OC_RELAY_URL = window.location.origin;
        } else {
            window.OC_RELAY_URL = window.OC_RELAY_URL || 'http://127.0.0.1:18790';
        }
        var API_URL = window.OC_API_URL || (window.location.hostname.includes('spawnkit.ai') ? window.location.origin : 'http://127.0.0.1:8765');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;500;600;700&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --castle-dark-navy: #1a1a2e;
            --castle-navy: #16213e;
            --castle-blue: #0f3460;
            --castle-red: #e94560;
            --castle-gold: #c9a959;
            --castle-brown: #8b7355;
            --castle-parchment: #f4e4bc;
            --castle-stone-light: #a8a299;
            --castle-stone-dark: #5c5750;
            --castle-black: #0d0d0d;
            --castle-silver: #c0c0c0;
            --bg-primary: var(--castle-dark-navy);
            --bg-secondary: var(--castle-navy);
            --bg-tertiary: var(--castle-blue);
            --bg-parchment: var(--castle-parchment);
            --text-primary: var(--castle-parchment);
            --text-secondary: var(--castle-stone-light);
            --text-accent: var(--castle-gold);
            --text-dark: var(--castle-navy);
            --text-red: var(--castle-red);
            --border-stone: rgba(168, 162, 153, 0.3);
            --border-gold: rgba(201, 169, 89, 0.5);
            --status-active: #4ade80;
            --status-busy: #fbbf24;
            --status-idle: #64748b;
            --status-error: var(--castle-red);
            --font-medieval: 'MedievalSharp', fantasy;
            --font-heading: 'Cinzel', serif;
            --font-body: 'Crimson Text', Georgia, serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); }

        #game-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            cursor: grab; z-index: 1;
        }

        /* ── Header ── */
        #header {
            position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 100;
            background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, rgba(26,26,46,0.7) 100%);
            border-bottom: 1px solid var(--border-gold);
            display: flex; align-items: center; padding: 0 16px;
            backdrop-filter: blur(8px);
        }
        #header h1 {
            font-family: var(--font-heading); font-size: 16px; color: var(--castle-gold);
            font-weight: 600; letter-spacing: 1px;
        }
        #header .subtitle {
            font-family: var(--font-body); font-size: 12px; color: var(--text-secondary);
            margin-left: 12px; opacity: 0.7;
        }
        #header .right {
            margin-left: auto; display: flex; gap: 12px; align-items: center;
        }
        .header-stat {
            font-size: 11px; color: var(--text-secondary);
            display: flex; align-items: center; gap: 4px;
        }
        .header-stat .dot {
            width: 6px; height: 6px; border-radius: 50%; display: inline-block;
        }
        .dot-active { background: var(--status-active); }
        .dot-idle { background: var(--status-idle); }

        /* ── Hotbar ── */
        #roblox-hotbar {
            position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 4px; z-index: 100;
            background: rgba(20, 20, 30, 0.85);
            border: 1px solid var(--border-gold);
            border-radius: 14px; padding: 6px 10px;
            backdrop-filter: blur(8px);
        }

        /* ── Chat container ── */
        #medievalChat {
            position: fixed; right: 12px; bottom: 80px; width: 360px; max-height: 400px;
            display: none; flex-direction: column;
            z-index: 200;
            background: rgba(22, 33, 62, 0.95);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        /* ── Panel container ── */
        #panel-container {
            position: fixed; left: 12px; top: 60px; bottom: 80px; width: 380px;
            z-index: 150; display: none;
            background: rgba(22, 33, 62, 0.95);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            backdrop-filter: blur(12px);
            overflow-y: auto;
        }
        #panel-container.open { display: flex; flex-direction: column; }
        #panel-container .panel-header {
            padding: 14px 16px; border-bottom: 1px solid var(--border-stone);
            display: flex; align-items: center; justify-content: space-between;
            font-family: var(--font-heading); font-size: 14px; color: var(--castle-gold);
        }
        #panel-container .panel-close {
            cursor: pointer; font-size: 18px; color: var(--text-secondary);
            background: none; border: none; padding: 4px 8px;
        }
        #panel-container .panel-close:hover { color: var(--castle-red); }
        #panel-container .panel-body {
            padding: 12px 16px; flex: 1; overflow-y: auto;
            font-size: 13px; line-height: 1.6;
        }

        /* ── Mission Control overlay ── */
        #missionControlOverlay {
            position: fixed; inset: 0; z-index: 300; display: none;
            background: rgba(10, 10, 20, 0.92);
            backdrop-filter: blur(8px);
        }
        #missionControlOverlay.open { display: flex; }

        /* ── Summon overlay ── */
        #summonOverlay {
            position: fixed; inset: 0; z-index: 400; display: none;
            background: rgba(10, 10, 20, 0.9); align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }

        /* ── Agent info bar ── */
        #agent-info {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 90; display: none;
            background: rgba(22, 33, 62, 0.92);
            border: 1px solid var(--border-gold);
            border-radius: 10px; padding: 10px 18px;
            backdrop-filter: blur(8px);
            font-size: 12px; color: var(--text-primary);
            white-space: nowrap;
        }
        #agent-info.visible { display: flex; align-items: center; gap: 12px; }
        #agent-info .agent-name { font-family: var(--font-heading); color: var(--castle-gold); font-weight: 600; }
        #agent-info .agent-title { color: var(--text-secondary); font-style: italic; }
        #agent-info .agent-mood { }
        #agent-info .agent-zone { color: var(--text-secondary); }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 3px; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            #panel-container { left: 0; right: 0; width: 100%; top: 48px; bottom: 72px; border-radius: 0; }
            #medievalChat { right: 0; left: 0; width: 100%; max-width: 100vw; bottom: 72px; border-radius: 12px 12px 0 0; }
            #roblox-hotbar { bottom: 8px; padding: 4px 6px; }
        }
    </style>
</head>
<body>
    <!-- Game canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Header -->
    <div id="header">
        <h1>⚔️ SpawnKit — Medieval Castle</h1>
        <span class="subtitle" id="header-subtitle">The realm awakens...</span>
        <div class="right">
            <span class="header-stat" id="agent-count"><span class="dot dot-active"></span> 0 agents</span>
            <span class="header-stat" id="time-of-day">☀️ Morning</span>
        </div>
    </div>

    <!-- Agent info bar (shows on select) -->
    <div id="agent-info">
        <span class="agent-name" id="ai-name"></span>
        <span class="agent-title" id="ai-title"></span>
        <span class="agent-mood" id="ai-mood"></span>
        <span class="agent-zone" id="ai-zone"></span>
    </div>

    <!-- Panel container (left sidebar for zone panels) -->
    <div id="panel-container">
        <div class="panel-header">
            <span id="panel-title">Panel</span>
            <button class="panel-close" onclick="closePanels()">&times;</button>
        </div>
        <div class="panel-body" id="panel-body"></div>
    </div>

    <!-- Chat -->
    <div id="medievalChat"></div>

    <!-- Mission Control overlay -->
    <div id="missionControlOverlay"></div>

    <!-- Summon overlay -->
    <div id="summonOverlay"></div>

    <!-- Hotbar -->
    <div id="roblox-hotbar"></div>

    <!-- Panel open helper -->
    <script>
        function openBuildingPanel(label) {
            var container = document.getElementById('panel-container');
            var title = document.getElementById('panel-title');
            var body = document.getElementById('panel-body');
            if (!container) return;
            title.textContent = label;
            body.innerHTML = '<p style="color:var(--text-secondary);">Loading ' + label + '...</p>';
            container.classList.add('open');
            // Dispatch for medieval-panels.js
            document.dispatchEvent(new CustomEvent('panel:open', { detail: { label: label } }));
        }
        window.openBuildingPanel = openBuildingPanel;

        function closePanels() {
            var container = document.getElementById('panel-container');
            if (container) container.classList.remove('open');
            document.dispatchEvent(new CustomEvent('panel:close'));
        }

        function openMissionControl() {
            var overlay = document.getElementById('missionControlOverlay');
            if (overlay) { overlay.classList.add('open'); }
        }
        window.openMissionControl = openMissionControl;

        function closeMissionControl() {
            var overlay = document.getElementById('missionControlOverlay');
            if (overlay) { overlay.classList.remove('open'); }
        }
        window.closeMissionControl = closeMissionControl;
    </script>

    <!-- Agent info bar updater -->
    <script>
        document.addEventListener('agent:select', function(e) {
            var agent = e.detail.agent;
            var bar = document.getElementById('agent-info');
            if (!agent) { bar.classList.remove('visible'); return; }
            document.getElementById('ai-name').textContent = agent.name;
            var p = agent.personality || {};
            document.getElementById('ai-title').textContent = p.title || '';
            document.getElementById('ai-mood').textContent = agent.emoji || '';
            document.getElementById('ai-zone').textContent = agent.currentZone ? ('📍 ' + agent.currentZone) : '';
            bar.classList.add('visible');
        });

        // Header updates
        setInterval(function() {
            var app = window.castleApp;
            if (!app) return;
            var count = app.agents ? app.agents.size : 0;
            var active = 0;
            if (app.agents) app.agents.forEach(function(ch) { if (ch.isActive) active++; });
            var el = document.getElementById('agent-count');
            if (el) el.innerHTML = '<span class="dot ' + (active > 0 ? 'dot-active' : 'dot-idle') + '"></span> ' + active + '/' + count + ' active';

            var tod = app._dayNightState ? app._dayNightState.timeOfDay : 'morning';
            var todEmojis = { dawn: '🌅', morning: '☀️', midday: '🌞', afternoon: '🌤️', dusk: '🌇', night: '🌙' };
            var todEl = document.getElementById('time-of-day');
            if (todEl) todEl.textContent = (todEmojis[tod] || '☀️') + ' ' + tod.charAt(0).toUpperCase() + tod.slice(1);
        }, 2000);
    </script>

    <!-- Load shared libs (same as v1) -->
    <script src="../lib/theme-auth.js"></script>
    <script src="../lib/routines.js"></script>
    <script src="../lib/activity-bubbles.js"></script>
    <script src="../lib/theme-chat.js"></script>
    <script src="../lib/agent-drag.js"></script>
    <script src="../lib/kanban-board.js"></script>
    <script src="../lib/theme-customize.js"></script>
    <script src="../office-medieval/src/data-bridge.js"></script>

    <!-- Load canvas engine (order matters: types → map → renderer → personalities → engine) -->
    <script src="medieval-types.js"></script>
    <script src="medieval-map.js"></script>
    <script src="medieval-renderer.js"></script>
    <script src="medieval-personalities.js"></script>
    <script src="medieval-engine.js"></script>

    <!-- Reuse v1 non-3D modules -->
    <script src="../office-medieval/medieval-mission-control.js"></script>
    <script src="../office-medieval/medieval-integration.js"></script>
    <script src="../office-medieval/medieval-panels.js"></script>
    <script src="../office-medieval/medieval-raven-anim.js"></script>
    <script src="../office-medieval/medieval-allied-kingdoms.js"></script>
    <script src="../office-medieval/setup-wizard.js"></script>
    <script src="../office-medieval/medieval-peering-ws.js"></script>
    <script src="../office-medieval/medieval-hotbar.js"></script>
    <script src="../office-medieval/medieval-audio.js"></script>
    <script src="../office-medieval/medieval-minimap.js"></script>
    <script src="../office-medieval/medieval-mission-hero.js"></script>
    <script src="../office-medieval/medieval-theme-picker.js"></script>
    <script src="../office-medieval/channel-onboarding.js"></script>
    <script src="../office-medieval/onboarding.js"></script>
    <script src="../office-medieval/summon-wizard.js"></script>
</body>
</html>
